<!DOCTYPE html>
<html>
<head>
    <title>TechFlow Solutions - Create Account</title>
</head>
<body>


<h1 style="background:black; color:white; text-align:center; padding:10px;">TechFlow Solutions</h1>


<form style="width:350px; margin:auto; padding:20px; border:1px solid #ccc; text-align:left;">
    <h2 style="text-align:center;">Create Account</h2>

    <label>Email Address</label><br>
    <input type="email" value="you@example.com " required style="width:100%;"><br><br>

    <label>Password</label><br>
    <input type="password" required style="width:100%;"><br><br>

    <label>Confirm Password</label><br>
    <input type="password" required style="width:100%;"><br><br>

    <label>Gender</label><br>
    <select required style="width:100%;">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select><br><br>

    <button type="submit" style="width:100%; background:green; color:white; padding:10px;">Register</button>
</form>
